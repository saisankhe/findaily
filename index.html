<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FinDaily</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FinDaily">
<meta name="theme-color" content="#f6f8fb">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<style>
  :root{ --ink:#1a2332; --muted:#5c6b80; --line:#e3e8ef; --bg:#f6f8fb; --card:#fff;
         --blue:#2563eb; --blue-bg:#eff4ff; --green:#0f9d58; --green-bg:#ecfaf1;
         --amber:#b45309; --amber-bg:#fff7e8; --purple:#7c3aed; --purple-bg:#f5f0ff; }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg);
       color:var(--ink); line-height:1.5; padding:calc(env(safe-area-inset-top) + 14px) 14px 60px;
       max-width:480px; margin:0 auto;}
  header{display:flex; align-items:baseline; gap:10px; margin-bottom:14px;}
  header h1{font-size:20px; letter-spacing:-0.3px;}
  header .dot{color:var(--green);}
  #streak{font-size:14px; font-weight:700;}
  #tally{margin-left:auto; font-size:12.5px; color:var(--muted); font-weight:600;}
  .stepline{font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:0.07em;
            color:var(--muted); margin:2px 2px 8px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px;
        margin-bottom:14px; box-shadow:0 1px 3px rgba(20,30,50,0.05);}
  .card.center{text-align:center; padding:26px 18px;}
  .card h3{font-size:18px; margin:8px 0 8px;}
  .card p{font-size:14px; margin-bottom:8px; color:#33415c;}
  .tag{font-size:10.5px; font-weight:800; text-transform:uppercase; letter-spacing:0.08em;
       padding:3px 9px; border-radius:99px; display:inline-block;}
  .tag.term{background:var(--blue-bg); color:var(--blue);}
  .tag.news{background:var(--green-bg); color:var(--green);}
  .tag.concept{background:var(--purple-bg); color:var(--purple);}
  .anchor{background:var(--amber-bg); border-left:3px solid var(--amber); padding:7px 10px;
          border-radius:0 8px 8px 0; font-size:13px; margin:8px 0; color:#7a4a08;}
  .whyline{background:var(--green-bg); border-left:3px solid var(--green); padding:7px 10px;
           border-radius:0 8px 8px 0; font-size:13px; margin:8px 0; color:#1c6b42;}
  .builds{font-size:12px; color:var(--muted); margin-top:8px;}
  .jargon{font-size:12px; color:var(--muted); margin-top:8px;}
  .jargon .known{color:var(--green); font-weight:700;}
  .jargon .new{color:var(--amber); font-weight:700;}
  .btnrow{display:flex; gap:10px; margin-top:14px;}
  .btn{flex:1; text-align:center; font-size:14px; font-weight:700; padding:12px 8px; border-radius:12px;
       border:none; cursor:pointer; font-family:inherit; text-decoration:none; display:block;}
  .btn.ghost{border:1.5px solid var(--line); color:var(--muted); background:var(--card);}
  .btn.solid{background:var(--ink); color:#fff;}
  .btn.wide{width:100%; margin-top:4px;}
  .asklink{margin-top:10px; background:var(--blue-bg); color:var(--blue); font-size:13px; padding:10px;}
  .sweep-row{display:flex; gap:10px; align-items:flex-start; padding:9px 0;
             border-bottom:1px dashed var(--line); font-size:13.5px; cursor:pointer;}
  .sweep-row:last-child{border-bottom:none;}
  .sweep-row input{width:19px; height:19px; margin-top:2px; accent-color:var(--green); flex:none;}
  .sweep-row span{color:#33415c;}
  .badge{font-size:10.5px; font-weight:800; background:var(--purple-bg); color:var(--purple);
         padding:2px 8px; border-radius:99px; text-transform:none; letter-spacing:0;}
  .badge.stale{background:var(--amber-bg); color:var(--amber);}
  /* embedded chat */
  .chat-ov{position:fixed; inset:0; background:rgba(26,35,50,.45); display:flex; align-items:flex-end; z-index:50;}
  .chat-panel{background:#fff; width:100%; max-width:480px; margin:0 auto; border-radius:18px 18px 0 0;
              max-height:88vh; display:flex; flex-direction:column;
              padding:14px 14px calc(env(safe-area-inset-bottom) + 12px);}
  .chat-head{display:flex; align-items:center; gap:8px; padding-bottom:8px; border-bottom:1px solid var(--line);}
  .chat-head h3{font-size:15px; flex:1;}
  .chat-head .mini,.chat-x{background:none; border:none; color:var(--muted); cursor:pointer; font-family:inherit;}
  .chat-head .mini{font-size:11.5px; text-decoration:underline;}
  .chat-x{font-size:19px; padding:2px 6px;}
  .chat-ctx{font-size:11.5px; color:var(--muted); background:var(--bg); border-radius:8px; padding:6px 9px; margin:8px 0 4px;}
  .chat-msgs{flex:1; overflow-y:auto; padding:6px 0; min-height:90px; display:flex; flex-direction:column;}
  .msg{max-width:85%; font-size:13.5px; line-height:1.45; padding:9px 12px; border-radius:14px; margin:5px 0;
       white-space:pre-wrap; overflow-wrap:break-word;}
  .msg.user{background:var(--ink); color:#fff; margin-left:auto; border-bottom-right-radius:4px;}
  .msg.ai{background:var(--bg); border:1px solid var(--line); border-bottom-left-radius:4px;}
  .msg.err{background:var(--amber-bg); border:1px solid #f3e2c2; color:#7a4a08;}
  .msg.pending{color:var(--muted);}
  .chat-row{display:flex; gap:8px; padding-top:10px; border-top:1px solid var(--line);}
  .chat-in{flex:1; border:1.5px solid var(--line); border-radius:12px; padding:10px 12px; font-size:16px;
           font-family:inherit; outline:none; min-width:0;}
  .chat-in:focus{border-color:var(--blue);}
  .chat-send{border:none; background:var(--ink); color:#fff; font-weight:700; border-radius:12px;
             padding:0 16px; font-size:14px; font-family:inherit; cursor:pointer;}
  .chat-send:disabled{opacity:.4;}
  .chip-sugg{font-size:12.5px; background:var(--blue-bg); color:var(--blue); border:none; border-radius:99px;
             padding:7px 12px; font-weight:700; font-family:inherit; cursor:pointer; align-self:flex-start; margin:4px 0;}
  .key-copy{font-size:13px; color:#33415c; margin:10px 0 4px;}
  .key-steps{font-size:12.5px; color:var(--muted); padding-left:18px; margin:8px 0;}
  .key-steps li{margin:3px 0;}
  .key-note{font-size:12px; background:var(--amber-bg); border-left:3px solid var(--amber);
            padding:7px 10px; border-radius:0 8px 8px 0; color:#7a4a08; margin:8px 0;}
</style>
</head>
<body>
<header>
  <h1>FinDaily<span class="dot">.</span></h1>
  <span id="streak"></span>
  <span id="tally"></span>
</header>
<div id="main"><div class="card"><p>Loading…</p></div></div>
<script src="data/curriculum.js"></script>
<script src="data/news-fallback.js"></script>
<script src="js/progress.js"></script>
<script src="js/ask-claude.js"></script>
<script src="js/app.js"></script>
</body>
</html>
